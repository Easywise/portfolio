<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — Easywise Studio</title>
<link rel="icon" type="image/png" href="https://easywise.com.ng/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1A3C34;
    --gold: #C9A84C;
    --gold-light: #E8C56A;
    --off-white: #F9F7F4;
  }
  body {
    background: var(--green);
    color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .logo { margin-bottom: 2rem; }
  .logo img { height: 48px; }
  .error-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(6rem, 20vw, 12rem);
    color: var(--gold);
    opacity: 0.3;
    line-height: 1;
    letter-spacing: 0.05em;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
    color: #fff;
  }
  p {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto 2rem;
  }
  .btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: var(--gold);
    color: var(--green);
    padding: 13px 32px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-secondary {
    background: transparent;
    color: var(--gold);
    padding: 12px 30px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-decoration: none;
    border: 1px solid rgba(200,153,42,0.4);
    transition: border-color 0.2s;
  }
  .btn-secondary:hover { border-color: var(--gold); }
</style>
</head>
<body>
  <div class="logo">
    <img src="https://easywise.com.ng/logo.png" alt="Easywise Studio" />
  </div>
  <div class="error-num">404</div>
  <h1>Page Not Found</h1>
  <p>Looks like this page doesn't exist. It may have been moved, deleted, or you may have typed the wrong URL.</p>
  <div class="btns">
    <a href="https://easywise.com.ng" class="btn-primary">Back to Home</a>
    <a href="https://wa.me/2348035107130" target="_blank" class="btn-secondary">Contact Us</a>
  </div>
</body>
</html>
